<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/main.css">
    <title>SimCity</title>
</head>

<body>
    <div id="root-window">
        <div id="loading-overlay">
            <div id="loading-text">Loading models...</div>
            <div id="loading-bar-container">
                <div id="loading-bar"></div>
            </div>
        </div>
        <div id="render-target">
            <div id="ui-toolbar">
                <button id='button-mouse' class="ui-button selected"
                    onclick='setActiveTool(event,"mouse")' title="Select">
                    <img src="/Icons/icons8-select-50.png" class="btn-icon-img" alt="Select">
                </button>
                <button id='button-bulldoze' class="ui-button bulldoze-btn"
                    onclick='setActiveTool(event,"bulldoze")' title="Bulldoze">
                    <img src="/Icons/icons8-bulldozer-48.png" class="btn-icon-img" alt="Bulldoze">
                </button>
                <div class="toolbar-divider"></div>
                <button id='button-zone-residential' class="ui-button residential-btn"
                    onclick='setActiveTool(event,"zone-residential")' title="Residential">
                    <img src="/Icons/icons8-house-50.png" class="btn-icon-img" alt="Residential">
                </button>
                <button id='button-zone-commercial' class="ui-button commercial-btn"
                    onclick='setActiveTool(event,"zone-commercial")' title="Commercial">
                    <img src="/Icons/icons8-office-50.png" class="btn-icon-img" alt="Commercial">
                </button>
                <button id='button-zone-industrial' class="ui-button industrial-btn"
                    onclick='setActiveTool(event,"zone-industrial")' title="Industrial">
                    <img src="/Icons/icons8-factory-50.png" class="btn-icon-img" alt="Industrial">
                </button>
                <div class="toolbar-divider"></div>
                <button id='button-road' class="ui-button road-btn" onclick='setActiveTool(event,"road")' title="Road">
                    <img src="/Icons/icons8-road-50.png" class="btn-icon-img" alt="Road">
                </button>
                <button id='button-landmark' class="ui-button landmark-btn"
                    onclick='setActiveTool(event,"landmark")' title="Landmark">
                    🏛️
                </button>
                <span class="toolbar-spacer"></span>
                <button id='button-pause' class="ui-button pause-btn" onclick='togglePause()' title="Pause">
                    <img src="/Icons/icons8-pause-50.png" class="btn-icon-img" alt="Pause">
                </button>
            </div>
            <div id="landmark-picker" class="hidden">
                <div id="landmark-picker-header">
                    <span>Select Landmark</span>
                    <button id="landmark-picker-close" onclick="closeLandmarkPicker()">&times;</button>
                </div>
                <div id="landmark-picker-body"></div>
            </div>
            <div id="view-mode-bar">
                <button id="vm-normal" class="vm-btn active" onclick="setViewMode('normal')" title="Normal View (1)">🏙️</button>
                <button id="vm-blueprint" class="vm-btn" onclick="setViewMode('blueprint')" title="Blueprint View (2)">📐</button>
                <button id="vm-xray" class="vm-btn" onclick="setViewMode('xray')" title="X-Ray View (3)">🔬</button>
            </div>
        </div>
        <div id="ui-titlebar">
            <div class="titlebar-section">
                <img src="/Icons/icons8-money-80.png" class="titlebar-icon" alt="Balance">
                <span id="balance-value">$10,000</span>
            </div>
            <div class="titlebar-section titlebar-center">
                <span id="city-name">SimCity</span>
            </div>
            <div class="titlebar-section titlebar-right">
                <span id="time-icon">☀️</span>
                <span id="time-value">12:00</span>
                <button id="speed-btn" class="speed-1" onclick="cycleSpeed()" title="Speed">
                    <span class="arrow a1">▶</span><span class="arrow a2">▶</span><span class="arrow a3">▶</span>
                </button>
                <span class="titlebar-divider-v"></span>
                <span class="titlebar-label">👤</span>
                <span id="population-value">0</span>
            </div>
        </div>
        <div id="info-overlay" class="hidden">
            <div id="info-header">
                <span id="info-title">Building Info</span>
                <button id="info-close" onclick="hideInfoOverlay()">&times;</button>
            </div>
            <div id="info-body"></div>
            <div id="transform-bar" class="hidden">
                <div class="transform-buttons">
                    <button id="btn-tf-translate" class="tf-btn active" onclick="setTransformMode('translate')" title="Move (T)">📐 Move</button>
                    <button id="btn-tf-rotate" class="tf-btn" onclick="setTransformMode('rotate')" title="Rotate (R)">🔄 Rotate</button>
                    <button id="btn-tf-scale" class="tf-btn" onclick="setTransformMode('scale')" title="Scale (S)">📏 Scale</button>
                </div>
                <div id="transform-values">
                    <div class="tf-row"><span class="tf-label">Pos</span> <span id="tf-pos">0, 0, 0</span></div>
                    <div class="tf-row"><span class="tf-label">Rot</span> <span id="tf-rot">0°</span></div>
                    <div class="tf-row"><span class="tf-label">Scale</span> <span id="tf-scale">1.0</span></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { createGame } from './src/game.js';
        import { setActiveTool, togglePause } from './src/ui/toolbar.js';
        import { showInfoOverlay, hideInfoOverlay } from './src/ui/infoPanel.js';
        import { LANDMARK_CATALOG } from './src/assets/landmarkCatalog.js';

        let game;
        window.onload = async () => {
            game = await createGame();
            window.game = game;
        };

        function populateLandmarkPicker() {
            const body = document.getElementById('landmark-picker-body');
            if (!body) return;
            const categories = [...new Set(LANDMARK_CATALOG.map(l => l.category))];
            body.innerHTML = categories.map(cat => `
                <div class="lp-category">
                    <div class="lp-category-title">${cat}</div>
                    <div class="lp-items">
                        ${LANDMARK_CATALOG.filter(l => l.category === cat).map(l => `
                            <button class="lp-item" onclick="selectLandmark('${l.id}')" title="${l.name}" id="lp-${l.id}">
                                <span class="lp-icon">${l.icon}</span>
                                <span class="lp-name">${l.name}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.setActiveTool = (event, toolID) => setActiveTool(event, toolID, game);
        window.togglePause = () => togglePause(game);
        window.showInfoOverlay = showInfoOverlay;
        window.hideInfoOverlay = hideInfoOverlay;
        window.selectLandmark = (id) => {
            game.setSelectedLandmark(id);
            document.querySelectorAll('.lp-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`lp-${id}`)?.classList.add('selected');
        };
        window.closeLandmarkPicker = () => {
            document.getElementById('landmark-picker')?.classList.add('hidden');
        };
        window.setViewMode = (mode) => {
            game.setViewMode(mode);
            document.querySelectorAll('.vm-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`vm-${mode}`)?.classList.add('active');
        };
        window.updateViewModeBtns = (mode) => {
            document.querySelectorAll('.vm-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`vm-${mode}`)?.classList.add('active');
        };
        window.setTransformMode = (mode) => {
            game.setTransformMode(mode);
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-tf-${mode}`)?.classList.add('active');
        };
        window.cycleSpeed = () => {
            const speeds = [1, 2, 4];
            const current = speeds.indexOf(game.timeSpeed) ;
            const next = (current + 1) % speeds.length;
            game.setTimeSpeed(speeds[next]);
            updateSpeedUI(speeds[next]);
        };
        function updateSpeedUI(speed) {
            const btn = document.getElementById('speed-btn');
            btn.classList.remove('speed-1', 'speed-2', 'speed-3');
            if (speed === 1) btn.classList.add('speed-1');
            else if (speed === 2) btn.classList.add('speed-2');
            else btn.classList.add('speed-3');
        }
    </script>
</body>

</html>
